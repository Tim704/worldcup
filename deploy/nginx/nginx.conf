# =============================================================================
# World Cup 2026 Fantasy Hub — nginx reverse proxy + SPA host.
#
# Installed at /etc/nginx/conf.d/default.conf inside the frontend image.
# Two jobs:
#   1. Serve the React single-page app (history-mode routing).
#   2. Reverse-proxy the API under /api/ to the backend service.
#
# Service names resolve via Docker's embedded DNS on the compose network, so
# `backend` is the `backend` service (CONTRACT §1 topology). Runs on arm64.
# =============================================================================

server {
    # nginx listens on container port 80; compose maps host 8081 → 80.
    listen 80;
    listen [::]:80;
    server_name _;

    # Static SPA bundle produced by `vite build` and copied into the image.
    root /usr/share/nginx/html;
    index index.html;

    # ---- API reverse proxy --------------------------------------------------
    # Forward every /api/ request to the Rust backend. The trailing slashes on
    # both sides keep the path 1:1 (e.g. /api/health → http://backend:8080/api/health),
    # matching the backend base path in CONTRACT §6.
    location /api/ {
        proxy_pass http://backend:8080/api/;

        # Preserve client/host context for the upstream and correct logging.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # HTTP/1.1 keep-alive to the upstream (lower latency on the Pi).
        proxy_http_version 1.1;

        # Generous but bounded timeouts (metric SI seconds).
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    # ---- SPA history-mode fallback -----------------------------------------
    # Try the literal file, then a directory, then fall back to index.html so
    # client-side routes (/predict, /bloodline, /shame …) resolve to the SPA
    # instead of 404. (CONTRACT §7 uses react-router-dom BrowserRouter.)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Static asset caching ----------------------------------------------
    # Vite emits content-hashed filenames under /assets, so they are safe to
    # cache long-term (one year, immutable).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Lightweight gzip for text payloads (helps on constrained Pi bandwidth).
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
