# =============================================================================
# World Cup 2026 Fantasy Hub — full-stack orchestration (Compose v3).
#
# Target host: Raspberry Pi 4/5 (Raspberry Pi OS Lite, arm64). EVERY service
# pins `platform: linux/arm64`, sets `restart: unless-stopped`, declares a
# healthcheck (or a health-gated `depends_on`) and a metric memory limit tuned
# for a constrained single-board computer.
#
# Topology (CONTRACT §1):
#   db (postgres:16-alpine) ← backend (Node/Express API) , ingest (Python)
#                              backend ← frontend (nginx SPA + /api proxy)
#
# The service name stays `backend` (nginx resolves it by that name); since v2
# its build context is ./server (Node 20+/Express + TypeScript). The legacy
# Rust code under ./backend is kept for reference but is no longer built.
#
# All variables come from CONTRACT §8; see .env.example for safe defaults. Copy
# it to .env (`cp .env.example .env`) before `docker compose up --build`.
# Every `${VAR:-default}` below inlines a safe dev default, so the stack also
# starts with no .env at all.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # db — PostgreSQL 16 (the single source of truth for all services).
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    platform: linux/arm64
    restart: unless-stopped
    # Credentials are fixed per the role brief / CONTRACT §8 DATABASE_URL
    # (postgres://wc:wc@db:5432/worldcup).
    environment:
      POSTGRES_USER: wc
      POSTGRES_PASSWORD: wc
      POSTGRES_DB: worldcup
    # Named volume → data survives container recreation (CONTRACT §1).
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    # Gate dependents until Postgres actually accepts connections.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wc -d worldcup"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Memory cap (metric): 512 MiB is comfortable for PG on a Pi.
    mem_limit: 512m

  # ---------------------------------------------------------------------------
  # backend — Node/Express + TypeScript API. Builds ./server (CONTRACT §9).
  #
  # Migrations auto-apply on container start (src/migrate.ts with a
  # connect-retry loop — 30 attempts × 2 s — so the Pi's slow Postgres start
  # never kills the container). The FIRST v2 boot drops the legacy v1 tables;
  # fixtures re-ingest automatically within INGEST_INTERVAL_SECS.
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./server
    platform: linux/arm64
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # Env names are fixed by CONTRACT §8. `${VAR:-default}` lets .env override;
    # the inlined defaults mirror .env.example so a bare checkout still boots.
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://wc:wc@db:5432/worldcup}
      PORT: ${PORT:-8080}
      # JWT signing secret (HS256). The default is a known placeholder — set a
      # real APP_SECRET in .env before exposing the stack beyond localhost.
      APP_SECRET: ${APP_SECRET:-change-me-please}
      # Comma-separated usernames granted is_admin = true on every login.
      ADMIN_USERNAMES: ${ADMIN_USERNAMES:-tom}
    ports:
      - "8080:8080"
    # Probe the API's own health route (CONTRACT §6: GET /api/health).
    healthcheck:
      # node:22-alpine ships BusyBox wget, so the probe needs no extra tooling
      # in the runtime image (curl is NOT installed there).
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    # Memory cap (metric): 256 MiB is ample for the lean Express service.
    mem_limit: 256m

  # ---------------------------------------------------------------------------
  # ingest — Python fixture ingestion loop. Builds ./scripts. No exposed port.
  # ---------------------------------------------------------------------------
  ingest:
    build:
      context: ./scripts
    platform: linux/arm64
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://wc:wc@db:5432/worldcup}
      INGEST_INTERVAL_SECS: ${INGEST_INTERVAL_SECS:-300}
      # Optional upstream feed (CONTRACT §8). Empty → script runs in idle/mock.
      FIXTURE_FEED_URL: ${FIXTURE_FEED_URL:-}
    # Liveness probe: confirm the long-running Python process is still present.
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f ingest.py > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # Memory cap (metric): 128 MiB is plenty for the small ingestion worker.
    mem_limit: 128m

  # ---------------------------------------------------------------------------
  # frontend — React SPA served by nginx, reverse-proxying /api → backend.
  #
  # Build context is the repo ROOT (not ./frontend) so the image can pull in
  # deploy/nginx/nginx.conf, which lives outside frontend/.
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # Build-time API base baked into the bundle by Vite (CONTRACT §8).
        # Default '/api' = SAME-ORIGIN: the browser hits the nginx that served
        # the SPA, which reverse-proxies /api/ → backend:8080. This is the only
        # value that works from another device (a friend's phone), because an
        # absolute 'localhost' origin would resolve to the visitor's OWN machine.
        # Override per-deployment via .env only if the API is exposed separately.
        VITE_API_BASE: ${VITE_API_BASE:-/api}
    platform: linux/arm64
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8081:80"
    # Probe nginx serving the SPA shell on the internal port 80.
    healthcheck:
      # nginx:alpine ships BusyBox wget; fetch the SPA shell as a liveness probe
      # (BusyBox ash has no /dev/tcp, so the previous bash-ism would never run).
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Memory cap (metric): 64 MiB is generous for static nginx.
    mem_limit: 64m

# -----------------------------------------------------------------------------
# Named volume for durable Postgres storage (CONTRACT §1).
# -----------------------------------------------------------------------------
volumes:
  pgdata:
